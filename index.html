<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Casper the AI</title>
<link rel="manifest" href="manifest.json">
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
    background-color: #f9f9f9;
  }
  h1 {
    margin-bottom: 20px;
  }
  #chat {
    width: 60%;
    height: 60%;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
    overflow-y: auto;
    background-color: #ffffff;
    margin-bottom: 10px;
  }
  #message {
    width: 80%;
    padding: 10px;
    font-size: 16px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
  #send {
    padding: 10px 20px;
    font-size: 16px;
    margin-left: 10px;
    border-radius: 4px;
    border: none;
    background-color: #007bff;
    color: white;
    cursor: pointer;
  }
  #send:hover {
    background-color: #0056b3;
  }
</style>
</head>
<body>
<h1>Casper the AI</h1>
<div id="chat"></div>
<div>
  <input type="text" id="message" placeholder="Type a message...">
  <button id="send">Send</button>
</div>
<script src="ai-visual.js"></script>
</body>
</html>
