<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casper the AI</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
            text-align: center;
        }
        #chat-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 600px;
        }
        #chat {
            width: 100%;
            height: 400px;
            background: #111;
            border: 1px solid #333;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        #input-container {
            display: flex;
            width: 100%;
        }
        #message {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px 0 0 5px;
            border: 1px solid #333;
            outline: none;
            background: #222;
            color: white;
        }
        #send {
            padding: 10px 20px;
            font-size: 16px;
            border: 1px solid #333;
            border-left: none;
            border-radius: 0 5px 5px 0;
            background: #444;
            color: white;
            cursor: pointer;
        }
        #send:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <h1>Casper the AI</h1>
    <div id="chat-container">
        <div id="chat"></div>
        <div id="input-container">
            <input type="text" id="message" placeholder="Type a message...">
            <button id="send">Send</button>
        </div>
    </div>

    <script src="ai-visual.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chat = document.getElementById('chat');
            const input = document.getElementById('message');
            const sendBtn = document.getElementById('send');

            // WebSocket connection, supports HTTPS & HTTP
            const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);

            ws.onopen = () => {
                console.log('Connected to Casper WebSocket');
            };

            ws.onmessage = (msg) => {
                const div = document.createElement('div');
                div.textContent = msg.data;
                chat.appendChild(div);
                chat.scrollTop = chat.scrollHeight;
            };

            sendBtn.onclick = () => {
                if(input.value.trim() !== '') {
                    ws.send(input.value);
                    input.value = '';
                }
            };

            input.addEventListener('keypress', e => {
                if(e.key === 'Enter') sendBtn.click();
            });
        });
    </script>
</body>
</html>
